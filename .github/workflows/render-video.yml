name: Render Video

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "video/public/**"
      - "video/src/**"
      - "script.json"

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable
          echo "CHROME_BIN=$(which google-chrome-stable)" >> $GITHUB_ENV

      - name: Verify local assets
        run: |
          echo "=== Audio files ==="
          ls video/public/*.wav 2>/dev/null | head -5 || echo "No WAV files"
          echo "=== Timing config ==="
          cat video/public/timings.json 2>/dev/null | head -5 || echo "No timings"

      - name: Install dependencies
        working-directory: ./video
        run: npm install

      - name: Render video
        working-directory: ./video
        env:
          REMOTION_BROWSER_EXECUTABLE: ${{ env.CHROME_BIN }}
        run: |
          mkdir -p out
          npx remotion render src/Root.tsx Main out/anthropic-story.mp4 \
            --log=verbose \
            --concurrency=4

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: anthropic-story-video
          path: video/out/anthropic-story.mp4
          retention-days: 90
