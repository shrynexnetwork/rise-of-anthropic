name: Render Video

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "video/public/audio/**"
      - "video/public/timings.json"
      - "video/src/**"
      - "script.json"

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify local assets
        run: |
          echo "=== Audio files ==="
          ls -la video/public/audio/ | head -5
          echo "..."
          ls -la video/public/audio/ | tail -5
          echo "=== Timing config ==="
          cat video/public/timings.json | head -5

      - name: Install dependencies
        working-directory: ./video
        run: npm install

      - name: Render video
        working-directory: ./video
        run: |
          CHROME_PATH=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || echo "/usr/bin/google-chrome-stable")
          if [ ! -x "$CHROME_PATH" ]; then
            echo "Chrome not found, installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq google-chrome-stable
            CHROME_PATH=$(command -v google-chrome-stable)
          fi
          export REMOTION_BROWSER_EXECUTABLE="$CHROME_PATH"
          mkdir -p out
          npx remotion render src/Root.tsx Main out/anthropic-story.mp4 \
            --log=verbose \
            --concurrency=4

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: anthropic-story-video
          path: video/out/anthropic-story.mp4
          retention-days: 90
