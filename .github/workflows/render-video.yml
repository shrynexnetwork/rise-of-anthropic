name: Render Video

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Generate TTS Audio"]
    types:
      - completed

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable
          echo "CHROME_BIN=$(which google-chrome-stable)" >> $GITHUB_ENV

      - name: Download TTS audio artifacts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: tts-audio
          path: tts-download
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download timing config
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: timing-config
          path: .
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Place TTS files in public dir
        if: github.event_name == 'workflow_run'
        run: |
          mkdir -p video/public
          cp tts-download/*.wav video/public/ 2>/dev/null || echo "No WAVs to copy"
          cp timings.json video/public/ 2>/dev/null || echo "No timings.json"
          echo "=== Files in video/public ==="
          ls -la video/public/ | head -20

      - name: Verify local assets
        run: |
          echo "=== Audio files ==="
          ls video/public/*.wav 2>/dev/null | head -5 || echo "No WAV files in public"
          echo "=== Timing config ==="
          cat video/public/timings.json 2>/dev/null | head -5 || echo "No timings in public"
          echo "=== Fallback: root timings.json ==="
          cat timings.json 2>/dev/null | head -5 || echo "No root timings.json"

      - name: Install dependencies
        working-directory: ./video
        run: npm install

      - name: Render video
        working-directory: ./video
        env:
          REMOTION_BROWSER_EXECUTABLE: ${{ env.CHROME_BIN }}
        run: |
          mkdir -p out
          npx remotion render src/Root.tsx Main out/anthropic-story.mp4 \
            --log=verbose \
            --concurrency=4

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: anthropic-story-video
          path: video/out/anthropic-story.mp4
          retention-days: 90
